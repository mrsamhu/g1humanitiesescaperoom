<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape the Command Center: SG Deterrence</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #1a2235;
            --text-main: #e2e8f0;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #334155;
        }

        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 20px; color: var(--accent-blue); text-transform: uppercase; }
        .room-indicator { font-weight: bold; font-size: 16px; color: var(--accent-green); text-align: right;}

        .scenario-box {
            background: #0f172a;
            padding: 20px;
            border-left: 4px solid var(--accent-blue);
            border-radius: 4px;
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 16px;
        }

        .options-container { display: flex; flex-direction: column; gap: 15px; }

        .option-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 15px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .option-btn:hover {
            border-color: var(--accent-blue);
            background-color: rgba(59, 130, 246, 0.1);
            transform: translateX(5px);
        }

        .option-btn span { font-weight: bold; color: var(--accent-blue); margin-right: 10px; }

        #outcomeScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(11, 15, 25, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            z-index: 10;
        }

        .outcome-title { font-size: 32px; margin-bottom: 15px; text-transform: uppercase; }
        .success-text { color: var(--accent-green); }
        .fail-text { color: var(--accent-red); }

        .outcome-desc { font-size: 18px; line-height: 1.6; max-width: 600px; margin-bottom: 30px; }

        .action-btn {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .action-btn:hover { background-color: #cbd5e1; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1>SG Command Center</h1>
            <div class="room-indicator" id="roomIndicator">Room 1/3<br>Step 1/5</div>
        </div>

        <div id="gamePlayArea">
            <h2 id="scenarioTitle" style="margin-top: 0;">Loading...</h2>
            <div class="scenario-box" id="scenarioDesc"></div>
            <div class="options-container" id="optionsContainer"></div>
        </div>

        <div id="outcomeScreen">
            <h2 class="outcome-title" id="outcomeTitle">Outcome</h2>
            <div class="outcome-desc" id="outcomeDesc">Explanation goes here.</div>
            <button class="action-btn" id="nextBtn" onclick="handleNextAction()">Continue</button>
        </div>
    </div>

    <script>
        const rooms = [
            {
                title: "Room 1: The Imminent Threat (Terrorism)",
                steps: [
                    {
                        desc: "STEP 1: Intelligence suggests an extremist sleeper cell is planning a coordinated explosive attack on a major MRT interchange in exactly 2 hours. You must direct the immediate response to defuse the situation.",
                        options: [
                            { text: "Evacuate the entire downtown core immediately using blaring sirens.", isCorrect: false, explanation: "Mass panic ensued. Realizing they were exposed, the terrorists detonated their devices early in the crowded bottlenecks." },
                            { text: "Wait for the terrorists to arrive at the MRT station to gather concrete legal evidence on CCTV.", isCorrect: false, explanation: "The delay was fatal. By the time visual confirmation was established, the devices were deployed." },
                            { text: "Discreetly activate the Special Operations Command (SOC) while using SGSecure to issue calm vigilance alerts.", isCorrect: true, explanation: "A swift, targeted response. The SOC apprehended the suspects without triggering a mass panic." }
                        ]
                    },
                    {
                        desc: "STEP 2: The suspects are detained, but one mentions a secondary device hidden in a nearby warehouse. How do you locate it quickly?",
                        options: [
                            { text: "Carpet bomb the industrial sector to ensure the device is destroyed.", isCorrect: false, explanation: "This caused massive civilian casualties and destroyed our own infrastructure. Military Defence must be precise." },
                            { text: "Deploy the SAF Chemical, Biological, Radiological and Explosive (CBRE) Defence Group to sweep the identified warehouse.", isCorrect: true, explanation: "Correct. The CBRE experts safely located and neutralized the threat without collateral damage." },
                            { text: "Ask the public to go into the warehouses to look for suspicious items to save time.", isCorrect: false, explanation: "You put untrained civilians in direct, lethal danger. Civil Defence relies on trained professionals leading the response." }
                        ]
                    },
                    {
                        desc: "STEP 3: The physical threat is neutralized, but rumors are spreading online that a third attack is happening right now at a mall. Panic is rising.",
                        options: [
                            { text: "Issue an official statement via trusted government channels and media outlets debunking the fake news.", isCorrect: true, explanation: "Psychological Defence in action. Providing clear, factual information calms the public and prevents panic." },
                            { text: "Shut down the entire internet in Singapore to stop the rumors from spreading.", isCorrect: false, explanation: "This crippled the economy and caused even more panic as citizens couldn't contact their loved ones." },
                            { text: "Ignore the rumors. The truth will eventually come out on its own.", isCorrect: false, explanation: "In a vacuum of information, fear takes over. You failed to protect the psychological resilience of the nation." }
                        ]
                    },
                    {
                        desc: "STEP 4: Intelligence reveals the mastermind is trying to flee the country. What is your border strategy?",
                        options: [
                            { text: "Close all borders permanently. No one enters or leaves Singapore ever again.", isCorrect: false, explanation: "An extreme overreaction that instantly collapsed our trade-dependent economy." },
                            { text: "Let them leave. It's better they are out of our country.", isCorrect: false, explanation: "You allowed a terrorist to escape justice, leaving them free to plan another attack from abroad." },
                            { text: "Enhance Immigration & Checkpoints Authority (ICA) biometric screening and share the suspect's profile with Interpol.", isCorrect: true, explanation: "Strong Border Security combined with international cooperation ensured the mastermind was apprehended at the checkpoint." }
                        ]
                    },
                    {
                        desc: "STEP 5: The crisis is over. However, the terrorists belonged to a specific ethnic group, and racial tensions are rising in the community.",
                        options: [
                            { text: "Segregate communities based on race to prevent them from fighting.", isCorrect: false, explanation: "This destroyed decades of racial harmony and created deeply divided, resentful communities." },
                            { text: "Mobilize grassroots leaders and Inter-Racial and Religious Confidence Circles (IRCCs) to facilitate community dialogues.", isCorrect: true, explanation: "Excellent Social Defence. By bringing people together to talk, you reinforced trust and unity, preventing the terrorists from dividing the nation." },
                            { text: "Ban all public gatherings indefinitely so people cannot argue.", isCorrect: false, explanation: "You suppressed the symptoms but let the underlying mistrust grow, weakening society's resilience." }
                        ]
                    }
                ]
            },
            {
                title: "Room 2: The Invisible Infiltration (Cyber Espionage)",
                steps: [
                    {
                        desc: "STEP 1: A highly sophisticated foreign entity has breached a critical government database containing defense blueprints. The data extraction is ongoing.",
                        options: [
                            { text: "Publicly accuse a specific superpower immediately, demanding they stop.", isCorrect: false, explanation: "Without undeniable proof, your reckless accusation sparked an international crisis." },
                            { text: "Isolate the compromised servers, deploy the Cyber Security Agency (CSA) to patch the vulnerability.", isCorrect: true, explanation: "Textbook Digital Defence. By isolating the threat, you protected the remaining data." },
                            { text: "Sever the undersea internet cables, disconnecting the entire country from the web.", isCorrect: false, explanation: "The cure was worse than the disease, completely collapsing our Economic Defence." }
                        ]
                    },
                    {
                        desc: "STEP 2: The Cyber Security Agency (CSA) discovers the malware is polymorphic (it changes its code constantly). Standard antiviruses are failing.",
                        options: [
                            { text: "Reboot all government computers. Maybe it will clear the memory.", isCorrect: false, explanation: "Rebooting did nothing to remove the deeply embedded malware, and you lost valuable diagnostic data." },
                            { text: "Pay a shady hacker group online to counter-hack the malware.", isCorrect: false, explanation: "You funded criminals and gave them access to national systems. The situation worsened." },
                            { text: "Utilize AI-driven threat hunting tools to identify the malware's behavior patterns and block its Command & Control server.", isCorrect: true, explanation: "By adapting with advanced technology, you successfully neutralized the active threat." }
                        ]
                    },
                    {
                        desc: "STEP 3: The attackers, frustrated, shift their target to Singapore's financial institutions to cause economic chaos.",
                        options: [
                            { text: "Order all banks to freeze all accounts so no money can move.", isCorrect: false, explanation: "This caused immediate domestic panic and destroyed international confidence in Singapore's financial hub." },
                            { text: "Mandate elevated cybersecurity protocols via the Monetary Authority of Singapore (MAS) and activate offline data backups.", isCorrect: true, explanation: "Economic Defence maintained. The banks stayed operational while shielding their core ledgers from corruption." },
                            { text: "Tell the private banks it is their own problem to solve.", isCorrect: false, explanation: "National security requires public-private partnership. The banks were overwhelmed and the economy crashed." }
                        ]
                    },
                    {
                        desc: "STEP 4: Digital forensics definitively trace the attack back to a specific state actor. They deny involvement.",
                        options: [
                            { text: "Launch a destructive military missile strike on their cyber-command headquarters.", isCorrect: false, explanation: "You escalated a cyber incident into a kinetic war. Deterrence failed." },
                            { text: "Work with ASEAN and international allies to issue a joint diplomatic statement condemning the cyber-norm violation.", isCorrect: true, explanation: "Strategic diplomacy. By rallying the international community, you applied pressure without firing a single shot." },
                            { text: "Ignore it. They didn't get the most important files anyway.", isCorrect: false, explanation: "Appeasement invites further attacks. You signaled that Singapore is a soft target." }
                        ]
                    },
                    {
                        desc: "STEP 5: The threat is repelled. How do you ensure this doesn't happen again?",
                        options: [
                            { text: "Ban all foreign software and only use locally made computers.", isCorrect: false, explanation: "This isolated Singapore from global technological advancements, severely stunting our growth." },
                            { text: "Launch a nationwide cyber hygiene campaign for citizens and businesses to prevent phishing, the main entry point for hackers.", isCorrect: true, explanation: "Total Defence relies on everyone. Educating the public hardens the nation against future digital intrusions." },
                            { text: "Make internet access read-only for the general public.", isCorrect: false, explanation: "An authoritarian move that destroyed the digital economy and civil liberties." }
                        ]
                    }
                ]
            },
            {
                title: "Room 3: The Territorial Intimidation (Aggressive State Actor)",
                steps: [
                    {
                        desc: "STEP 1: Radar shows a larger neighboring state conducting aggressive, unannounced naval drills right on the edge of Singapore's territorial waters.",
                        options: [
                            { text: "Ignore the drills and tell commercial ships to find alternative routes.", isCorrect: false, explanation: "Appeasement failed. Yielding sovereign rights invited further bullying." },
                            { text: "Deploy the Republic of Singapore Navy (RSN) to patrol borders without engaging, and open diplomatic channels.", isCorrect: true, explanation: "Perfect deterrence. The RSN showed readiness while diplomacy kept tensions from boiling over." },
                            { text: "Fire warning shots across the bows of the foreign vessels.", isCorrect: false, explanation: "Catastrophic escalation. Your warning shots started an unnecessary war." }
                        ]
                    },
                    {
                        desc: "STEP 2: In retaliation for our patrols, the foreign state threatens to block vital food and sand exports to Singapore.",
                        options: [
                            { text: "Surrender to their demands to keep the food flowing.", isCorrect: false, explanation: "You compromised national sovereignty. They now know they can control Singapore through blackmail." },
                            { text: "Threaten to bomb their commercial ports if they stop the exports.", isCorrect: false, explanation: "Aggressive military threats isolated Singapore globally and validated the foreign state's aggression." },
                            { text: "Tap into national stockpiles immediately and activate diversified supply chains from other countries.", isCorrect: true, explanation: "Economic Defence saved the day. By showing we don't rely solely on them, their blackmail tactic became useless." }
                        ]
                    },
                    {
                        desc: "STEP 3: The foreign state begins broadcasting propaganda into Singapore, claiming our land historically belongs to them.",
                        options: [
                            { text: "Reinforce National Education messaging, reminding citizens of our sovereign history and the importance of unity.", isCorrect: true, explanation: "Strong Psychological Defence. An educated, united populace will not be swayed by foreign interference." },
                            { text: "Broadcast our own fake news into their country to confuse their citizens.", isCorrect: false, explanation: "Engaging in a disinformation war eroded our international standing and moral high ground." },
                            { text: "Arrest anyone caught listening to the broadcasts.", isCorrect: false, explanation: "Heavy-handed policing caused domestic resentment and played right into the enemy's narrative of a fractured society." }
                        ]
                    },
                    {
                        desc: "STEP 4: Tensions escalate. The foreign state begins massing troops near the border.",
                        options: [
                            { text: "Disband the SAF to prove we have no hostile intentions.", isCorrect: false, explanation: "You completely removed our Military Defence. They invaded the next day." },
                            { text: "Sign a unilateral defense treaty, becoming a puppet state to a rival superpower.", isCorrect: false, explanation: "You traded one threat for another, losing Singapore's independent foreign policy and sovereignty." },
                            { text: "Conduct planned, joint military exercises with friendly international nations to signal our robust defense ties.", isCorrect: true, explanation: "Deterrence through alliances. Showing strong partnerships makes the aggressor recalculate the cost of an invasion." }
                        ]
                    },
                    {
                        desc: "STEP 5: The crisis peaks at an emergency ASEAN summit. Their leader aggressively demands concessions in front of the world.",
                        options: [
                            { text: "Walk out of the summit in protest.", isCorrect: false, explanation: "You abandoned the diplomatic battlefield, allowing them to control the narrative." },
                            { text: "Stand firm, reiterate Singapore's commitment to international law (UNCLOS), and propose mutual economic cooperation instead.", isCorrect: true, explanation: "Masterful diplomacy. You held the line on sovereignty while offering a peaceful, prosperous off-ramp for both nations." },
                            { text: "Challenge their leader to a physical fight to show strength.", isCorrect: false, explanation: "You embarrassed the nation on the global stage and destroyed our diplomatic credibility." }
                        ]
                    }
                ]
            }
        ];

        let currentRoomIndex = 0;
        let currentStepIndex = 0;
        let state = "PLAYING"; // PLAYING, STEP_FAIL, ROOM_WIN, GAME_WIN

        function loadStep() {
            const room = rooms[currentRoomIndex];
            const step = room.steps[currentStepIndex];
            
            document.getElementById('roomIndicator').innerHTML = `Room ${currentRoomIndex + 1}/3<br>Step ${currentStepIndex + 1}/5`;
            document.getElementById('scenarioTitle').innerText = room.title;
            document.getElementById('scenarioDesc').innerText = step.desc;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            let shuffledOptions = [...step.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>[Option ${String.fromCharCode(65 + index)}]</span> ${opt.text}`;
                btn.onclick = () => selectOption(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(option) {
            const outcomeScreen = document.getElementById('outcomeScreen');
            const outcomeTitle = document.getElementById('outcomeTitle');
            const outcomeDesc = document.getElementById('outcomeDesc');
            const nextBtn = document.getElementById('nextBtn');

            outcomeScreen.style.display = 'flex';
            outcomeDesc.innerText = option.explanation;

            if (option.isCorrect) {
                outcomeTitle.className = "outcome-title success-text";
                
                // Check if this was the last step in the room
                if (currentStepIndex === rooms[currentRoomIndex].steps.length - 1) {
                    outcomeTitle.innerText = "ROOM UNLOCKED";
                    state = "ROOM_WIN";
                    
                    // Check if this was the final room in the game
                    if (currentRoomIndex === rooms.length - 1) {
                        nextBtn.innerText = "Complete Simulation";
                        state = "GAME_WIN";
                    } else {
                        nextBtn.innerText = "Enter Next Room";
                    }
                } else {
                    outcomeTitle.innerText = "CORRECT ACTION";
                    state = "PLAYING";
                    nextBtn.innerText = "Next Step";
                }
            } else {
                outcomeTitle.innerText = "PROTOCOL FAILED";
                outcomeTitle.className = "outcome-title fail-text";
                state = "STEP_FAIL";
                nextBtn.innerText = "Restart Room Protocol";
            }
        }

        function handleNextAction() {
            const outcomeScreen = document.getElementById('outcomeScreen');
            outcomeScreen.style.display = 'none';

            if (state === "STEP_FAIL") {
                // Reset to step 1 of the CURRENT room
                currentStepIndex = 0;
                loadStep();
            } else if (state === "PLAYING") {
                // Move to next step
                currentStepIndex++;
                loadStep();
            } else if (state === "ROOM_WIN") {
                // Move to step 1 of the NEXT room
                currentRoomIndex++;
                currentStepIndex = 0;
                loadStep();
            } else if (state === "GAME_WIN") {
                // Victory Screen
                document.getElementById('gamePlayArea').innerHTML = `
                    <h2 style="color: #10b981; text-align:center; font-size: 30px;">COMMAND CENTER UNLOCKED</h2>
                    <div class="scenario-box" style="text-align:center; font-size: 18px;">
                        Congratulations, Director. You have successfully navigated all 15 crisis points.<br><br>
                        By balancing Military strength, Civil preparedness, Economic resilience, Social harmony, Psychological fortitude, and Digital security, you have proven that Total Defence is the ultimate deterrent.<br><br>
                        Singapore remains secure.
                    </div>
                    <div style="text-align:center;">
                        <button class="action-btn" onclick="location.reload()">Play Again</button>
                    </div>
                `;
            }
        }

        // Initialize the game
        loadStep();
    </script>
</body>
</html>
