<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape the Command Center: SG Deterrence</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #1a2235;
            --text-main: #e2e8f0;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #334155;
        }

        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 22px; color: var(--accent-blue); text-transform: uppercase; }
        .room-indicator { font-weight: bold; font-size: 18px; color: var(--accent-green); }

        .scenario-box {
            background: #0f172a;
            padding: 20px;
            border-left: 4px solid var(--accent-blue);
            border-radius: 4px;
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 16px;
        }

        .options-container { display: flex; flex-direction: column; gap: 15px; }

        .option-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 15px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .option-btn:hover {
            border-color: var(--accent-blue);
            background-color: rgba(59, 130, 246, 0.1);
            transform: translateX(5px);
        }

        .option-btn span { font-weight: bold; color: var(--accent-blue); margin-right: 10px; }

        /* Outcome Overlay */
        #outcomeScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(11, 15, 25, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            z-index: 10;
        }

        .outcome-title { font-size: 32px; margin-bottom: 15px; text-transform: uppercase; }
        .success-text { color: var(--accent-green); }
        .fail-text { color: var(--accent-red); }

        .outcome-desc {
            font-size: 18px;
            line-height: 1.6;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .action-btn {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .action-btn:hover { background-color: #cbd5e1; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1>SG Command Center Lockdown</h1>
            <div class="room-indicator" id="roomIndicator">Room 1 / 3</div>
        </div>

        <div id="gamePlayArea">
            <h2 id="scenarioTitle" style="margin-top: 0;">Loading...</h2>
            <div class="scenario-box" id="scenarioDesc"></div>
            
            <div class="options-container" id="optionsContainer">
                </div>
        </div>

        <div id="outcomeScreen">
            <h2 class="outcome-title" id="outcomeTitle">Outcome</h2>
            <div class="outcome-desc" id="outcomeDesc">Explanation goes here.</div>
            <button class="action-btn" id="nextBtn" onclick="handleNextAction()">Continue</button>
        </div>
    </div>

    <script>
        const scenarios = [
            {
                title: "Room 1: The Imminent Threat (Terrorism)",
                desc: "Intelligence suggests an extremist sleeper cell is planning a coordinated explosive attack on a major MRT interchange in exactly 2 hours. The command center doors have locked to prevent leaks. You must direct the immediate response to defuse the situation.",
                options: [
                    {
                        text: "Evacuate the entire downtown core immediately using blaring sirens and island-wide emergency broadcasts.",
                        isCorrect: false,
                        explanation: "Mass panic ensued. The massive evacuation caused severe injuries and choked the roads. Realizing they were exposed, the terrorists detonated their devices early in the crowded bottlenecks. Singapore's psychological and civil defence failed due to overreaction and loss of control."
                    },
                    {
                        text: "Wait for the terrorists to arrive at the MRT station so police can catch them on CCTV to gather concrete legal evidence before arresting them.",
                        isCorrect: false,
                        explanation: "The delay was fatal. By the time visual confirmation was established, the terrorists had already deployed their devices. Deterrence relies on proactive, preventative action, not just reactive policing. You failed to protect the citizens."
                    },
                    {
                        text: "Discreetly activate the Special Operations Command (SOC) to secure the perimeter while using SGSecure to issue localized, calm vigilance alerts to station staff and commuters.",
                        isCorrect: true,
                        explanation: "A swift, targeted, and calm response. The SOC apprehended the suspects without triggering a mass panic, while alert citizens helped identify an unattended bag. You successfully demonstrated the balance of Military, Civil, and Social defence."
                    }
                ]
            },
            {
                title: "Room 2: The Invisible Infiltration (Cyber Espionage)",
                desc: "You successfully bypassed the first lockdown door. Suddenly, alarms blare. A highly sophisticated foreign entity has breached a critical government database containing defense blueprints and citizen data. The data extraction is ongoing.",
                options: [
                    {
                        text: "Publicly accuse a specific major superpower immediately on global news, demanding they stop the attack or face war.",
                        isCorrect: false,
                        explanation: "Diplomatic disaster. Without concrete digital forensics, your accusation sparked a severe international crisis and economic sanctions against Singapore. True deterrence requires measured diplomacy and undeniable proof, not reckless escalation."
                    },
                    {
                        text: "Isolate the compromised servers, deploy the Cyber Security Agency (CSA) to patch the vulnerability, and quietly share the threat intelligence with international allies.",
                        isCorrect: true,
                        explanation: "Textbook digital deterrence. By isolating the threat, you protected the remaining data. Sharing the intelligence with allies builds a collective cyber defense network, deterring the attacker from trying again as their methods are now known globally."
                    },
                    {
                        text: "Physically sever the undersea internet cables, disconnecting the entire country from the global internet to ensure the data cannot leave.",
                        isCorrect: false,
                        explanation: "Economic suicide. While you stopped the leak, cutting off the internet crippled Singapore's financial sector, international trade, and communications. The cure was worse than the disease, completely collapsing our Economic Defence."
                    }
                ]
            },
            {
                title: "Room 3: The Territorial Intimidation (Aggressive State Actor)",
                desc: "You are at the final door. Radar shows a much larger neighboring state has begun conducting aggressive, unannounced naval drills right on the edge of Singapore's territorial waters, aggressively disrupting vital international trade routes.",
                options: [
                    {
                        text: "Ignore the drills entirely and order commercial ships to find longer, alternative routes to avoid provoking the foreign navy.",
                        isCorrect: false,
                        explanation: "Appeasement failed. By yielding our sovereign rights to free navigation, you showed weakness. This invited further bullying and permanently damaged investor confidence in Singapore as a secure global hub. We lost our sovereignty without firing a shot."
                    },
                    {
                        text: "Maintain high vigilance, deploy the Republic of Singapore Navy (RSN) to patrol our borders without engaging, and immediately open diplomatic channels citing international maritime law.",
                        isCorrect: true,
                        explanation: "Perfect execution of deterrence and diplomacy. The RSN's presence showed we are ready and capable of defending our sovereignty, while leveraging international law (like UNCLOS) rallied global support. You held the line without sparking a war."
                    },
                    {
                        text: "Fire warning shots across the bows of the foreign vessels to show strength and prove that Singapore will not be intimidated.",
                        isCorrect: false,
                        explanation: "Catastrophic escalation. Your warning shots were interpreted as an act of war by the larger state. Singapore was forced into an asymmetric kinetic conflict that devastated our infrastructure. Deterrence is meant to prevent war, not start it."
                    }
                ]
            }
        ];

        let currentRoom = 0;
        let isCurrentGameOver = false;

        function loadRoom() {
            const scenario = scenarios[currentRoom];
            document.getElementById('roomIndicator').innerText = `Room ${currentRoom + 1} / 3`;
            document.getElementById('scenarioTitle').innerText = scenario.title;
            document.getElementById('scenarioDesc').innerText = scenario.desc;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            // Randomize options so the answer isn't always in the same spot
            let shuffledOptions = [...scenario.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>[Option ${String.fromCharCode(65 + index)}]</span> ${opt.text}`;
                btn.onclick = () => selectOption(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(option) {
            const outcomeScreen = document.getElementById('outcomeScreen');
            const outcomeTitle = document.getElementById('outcomeTitle');
            const outcomeDesc = document.getElementById('outcomeDesc');
            const nextBtn = document.getElementById('nextBtn');

            outcomeScreen.style.display = 'flex';
            outcomeDesc.innerText = option.explanation;

            if (option.isCorrect) {
                outcomeTitle.innerText = "ACCESS GRANTED";
                outcomeTitle.className = "outcome-title success-text";
                isCurrentGameOver = false;
                
                if (currentRoom === scenarios.length - 1) {
                    nextBtn.innerText = "Finish Game";
                } else {
                    nextBtn.innerText = "Proceed to Next Room";
                }
            } else {
                outcomeTitle.innerText = "LOCKDOWN ENFORCED: FAILED";
                outcomeTitle.className = "outcome-title fail-text";
                isCurrentGameOver = true;
                nextBtn.innerText = "Restart Protocol (Try Again)";
            }
        }

        function handleNextAction() {
            const outcomeScreen = document.getElementById('outcomeScreen');
            outcomeScreen.style.display = 'none';

            if (isCurrentGameOver) {
                // They failed, reset to room 1
                currentRoom = 0;
                loadRoom();
            } else {
                // They succeeded
                if (currentRoom < scenarios.length - 1) {
                    currentRoom++;
                    loadRoom();
                } else {
                    // Won the game
                    document.getElementById('gamePlayArea').innerHTML = `
                        <h2 style="color: #10b981; text-align:center; font-size: 30px;">COMMAND CENTER UNLOCKED</h2>
                        <div class="scenario-box" style="text-align:center; font-size: 18px;">
                            Congratulations, Director. Your deep understanding of Singapore's strategic vulnerabilities and the principles of Total Defence has successfully navigated us through these crises.<br><br>
                            You applied measured diplomacy, robust security protocols, and psychological resilience to maintain peace and sovereignty.<br><br>
                            You have escaped the room.
                        </div>
                        <div style="text-align:center;">
                            <button class="action-btn" onclick="location.reload()">Play Again</button>
                        </div>
                    `;
                }
            }
        }

        // Initialize the game
        loadRoom();
    </script>
</body>
</html>
